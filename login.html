<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login User</title>

    <link rel="stylesheet" href="css/bootstrap.min.css">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>

        body{
            background: linear-gradient(to right, orange, rgb(255, 196, 0));
        }

        .login-card{
            border-radius: 20px;
        }

        .social-btn{
            border-radius: 10px;
        }

    </style>

</head>

<body>

<section class="d-flex align-items-center vh-100">

    <div class="container">

        <div class="row justify-content-center">

            <div class="col-md-4">

                <div class="card login-card shadow border-0 p-4">

                    <h2 class="text-center fw-bold mb-4">
                        Login Wisata
                    </h2>

                    <!-- FORM LOGIN -->
                    <form onsubmit="login(event)">

                        <!-- USERNAME -->
                        <div class="mb-3">

                            <label class="form-label">
                                Username
                            </label>

                            <input type="text"
                                   id="username"
                                   class="form-control"
                                   placeholder="Masukkan Username"
                                   required>

                        </div>

                        <!-- PASSWORD -->
                        <div class="mb-3">

                            <label class="form-label">
                                Password
                            </label>

                            <input type="password"
                                   id="password"
                                   class="form-control"
                                   placeholder="Masukkan Password"
                                   required>

                        </div>

                        <!-- LOGIN BUTTON -->
                        <button type="submit"
                                class="btn btn-primary w-100 mb-3">

                            Login

                        </button>

                    </form>

                    <!-- SOSIAL LOGIN -->
                    <div class="text-center mb-3">

                        <p class="text-muted">
                            Atau login dengan
                        </p>

                        <button class="btn btn-danger social-btn w-100 mb-2">

                            <i class="bi bi-google"></i>
                            Login dengan Gmail

                        </button>

                        <button class="btn btn-primary social-btn w-100">

                            <i class="bi bi-facebook"></i>
                            Login dengan Facebook

                        </button>

                    </div>

                    <!-- REGISTER -->
                    <p class="text-center mt-4">

                        Belum punya akun?

                        <a href="register.html"
                           class="text-decoration-none fw-bold">

                            Register

                        </a>

                    </p>

                    <!-- KEMBALI -->
                    <a href="index.html"
                       class="btn btn-dark w-100">

                        Kembali ke Beranda

                    </a>

                </div>

            </div>

        </div>

    </div>

</section>

<script src="js/login.js"></script>

</body>
</html>
